name: Build & deploy Flutter web to GitHub Pages

# Builds the Flutter web app on every push to main and publishes it to
# GitHub Pages. Nothing has to be built locally — GitHub's runners do it.
on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        # base-href must match the repo name so assets resolve under
        # https://<user>.github.io/hostel-management/
        run: flutter build web --release --base-href "/hostel-management/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
